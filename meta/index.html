<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta</title>
  <link rel="stylesheet" href="../style.css" />
  <script type="module" src="../global.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <h1>Meta</h1>
  <p>This page includes stats about the code of this website.</p>

  <div id="stats"></div>

  <h2>Commits by time of day</h2>
  <p id="selection-count">No commits selected</p>
  <dl id="language-breakdown" class="stats"></dl>
  <div id="chart"></div>

  <!-- TOOLTIP -->
  <dl id="tooltip" class="tooltip hidden">
    <dt>Commit</dt>
    <dd id="commit-link"></dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines changed</dt>
    <dd id="commit-lines"></dd>
  </dl>

</body>
</html>
